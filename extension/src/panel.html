<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SoundCloud Toolkit</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <header class="header">
      <h1>Toolkit</h1>
      <button id="openOptions" type="button" class="link">API settings</button>
    </header>

    <section id="authSection" class="card">
      <p id="authStatus" class="muted">Checking session…</p>
      <div class="row">
        <button id="signIn" type="button">Sign in</button>
        <button id="refreshSession" type="button" class="secondary">Refresh session</button>
        <button id="signOut" type="button" class="secondary" hidden>Sign out</button>
      </div>
    </section>

    <section class="card">
      <h2>Likes → playlist</h2>
      <p class="muted small">
        On SoundCloud, open your likes or library and use the checkboxes to choose tracks. IDs are read from the page when
        available; otherwise URLs are resolved via your Toolkit account.
      </p>
      <p class="selection-line">
        Selected: <strong id="selectionCount">0</strong> tracks
      </p>
      <label for="playlistTitle">Playlist title</label>
      <input id="playlistTitle" type="text" maxlength="200" placeholder="My playlist" autocomplete="off" />
      <div class="row">
        <button id="createPlaylist" type="button" disabled>Create playlist</button>
      </div>
      <p id="actionMessage" class="message" role="status"></p>
    </section>

    <script src="panel.js"></script>
  </body>
</html>
