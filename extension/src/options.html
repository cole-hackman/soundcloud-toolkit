<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SoundCloud Toolkit — Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>SoundCloud Toolkit</h1>
      <label for="apiBase">API base URL</label>
      <p class="hint">
        Production: <code>https://api.soundcloudtoolkit.com</code><br />
        Local dev: <code>http://localhost:3001</code>
      </p>
      <input id="apiBase" type="url" spellcheck="false" autocomplete="off" />
      <div class="actions">
        <button id="save" type="button">Save</button>
        <span id="status" role="status"></span>
      </div>
      <section class="help">
        <h2>Chrome Web Store ID</h2>
        <p>
          Add your extension ID to the API server environment as <code>CHROME_EXTENSION_IDS</code> (comma-separated)
          so credentialed requests from this extension pass CORS.
        </p>
      </section>
    </main>
    <script src="options.js"></script>
  </body>
</html>
